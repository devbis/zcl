name: Publish ZCL HTML to Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download ZCL PDF
        run: |
          curl -fL "https://zigbeealliance.org/wp-content/uploads/2021/10/07-5123-08-Zigbee-Cluster-Library.pdf" -o zcl.pdf

      - name: Convert PDF to HTML
        run: |
          mkdir -p site
          python extract_pdf_to_html.py zcl.pdf -o site/index.html --images
          mv site/index.images site/images
          sed -i 's/src="index.images/src="images/g' site/index.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          force_orphan: true
          full_commit_message: "chore: publish converted ZCL HTML"
